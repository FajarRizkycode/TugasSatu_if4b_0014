<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Ghibli</title>

    <link rel="stylesheet" href="style.css">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ☁️ AWAN -->
    <div class="clouds">
        <div class="cloud x1"></div>
        <div class="cloud x2"></div>
        <div class="cloud x3"></div>
        <div class="cloud x4"></div>
        <div class="cloud x5"></div>
        <div class="cloud x6"></div>
        <div class="cloud x7"></div>
        <div class="cloud x8"></div>
    </div>

    <!-- ⭐ BINTANG -->
    <div class="stars"></div>

    <!-- CARD -->
    <div class="card">

        <button id="toggleMode">🌙 Mode Malam</button>

        <h1>Todo List</h1>

        <div id="formtodo">
            <input type="text" id="inputTask" placeholder="Masukkan Tugas">
            <input type="date" id="tanggalTask">
            <button id="btnTambahTodo">Tambah</button>
        </div>

        <h3>Daftar Tugas</h3>

        <ul id="daftartugas"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
